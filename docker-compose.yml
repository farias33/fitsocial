services:
  web:
    build:
      context: ./apps/web
      dockerfile: Dockerfile
      target: development
    ports:
      - '3000:3000'
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:4000
    depends_on:
      - api
    volumes:
      - ./apps/web:/app
      - /app/node_modules
      - /app/.next

  api:
    build:
      context: ./apps/api
      dockerfile: Dockerfile
      target: development
    ports:
      - '4000:4000'
    environment:
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/fitsocial
      REDIS_URL: redis://redis:6379
      RABBITMQ_URL: amqp://guest:guest@rabbitmq:5672
      JWT_SECRET: dev-secret-local-change-in-prod
      JWT_REFRESH_SECRET: dev-refresh-secret-local-change-in-prod
      NODE_ENV: development
      PORT: 4000
      # Storage — MinIO local
      STORAGE_ENDPOINT: http://minio:9000
      STORAGE_BUCKET: fitsocial
      STORAGE_REGION: us-east-1
      STORAGE_ACCESS_KEY: minioadmin
      STORAGE_SECRET_KEY: minioadmin
      STORAGE_PUBLIC_URL: http://localhost:9000/fitsocial
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
      rabbitmq:
        condition: service_healthy
      minio:
        condition: service_started
    volumes:
      - ./apps/api:/app
      - /app/node_modules

  worker:
    build:
      context: ./apps/api
      dockerfile: Dockerfile
      target: development
    command: ['pnpm', 'run', 'dev:worker']
    environment:
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/fitsocial
      REDIS_URL: redis://redis:6379
      RABBITMQ_URL: amqp://guest:guest@rabbitmq:5672
      NODE_ENV: development
      # Storage — MinIO local
      STORAGE_ENDPOINT: http://minio:9000
      STORAGE_BUCKET: fitsocial
      STORAGE_REGION: us-east-1
      STORAGE_ACCESS_KEY: minioadmin
      STORAGE_SECRET_KEY: minioadmin
      STORAGE_PUBLIC_URL: http://localhost:9000/fitsocial
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
      rabbitmq:
        condition: service_healthy
      minio:
        condition: service_started
    volumes:
      - ./apps/api:/app
      - /app/node_modules

  postgres:
    image: postgres:16-alpine
    ports:
      - '5432:5432'
    environment:
      POSTGRES_DB: fitsocial
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    volumes:
      - pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U postgres']
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - '6379:6379'
    volumes:
      - redis_data:/data

  rabbitmq:
    image: rabbitmq:3-management-alpine
    ports:
      - '5672:5672'
      - '15672:15672'
    environment:
      RABBITMQ_DEFAULT_USER: guest
      RABBITMQ_DEFAULT_PASS: guest
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    healthcheck:
      test: ['CMD', 'rabbitmq-diagnostics', 'ping']
      interval: 10s
      timeout: 5s
      retries: 5

  adminer:
    image: adminer
    ports:
      - '8080:8080'
    depends_on:
      - postgres

  minio:
    image: minio/minio
    ports:
      - '9000:9000'
      - '9001:9001'
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    command: server /data --console-address ':9001'
    volumes:
      - minio_data:/data

volumes:
  pg_data:
  redis_data:
  rabbitmq_data:
  minio_data:
