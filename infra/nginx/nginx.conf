# ─── Upstream ────────────────────────────────────────────────────────────────
upstream api_cluster {
  least_conn;
  server api:4000 weight=1 max_fails=3 fail_timeout=30s;
  keepalive 32;
}

upstream nextjs {
  server web:3000;
  keepalive 16;
}

# Rate limiting zones
limit_req_zone $binary_remote_addr zone=auth_limit:10m rate=10r/m;
limit_req_zone $binary_remote_addr zone=api_limit:10m rate=30r/s;

# ─── HTTPS ────────────────────────────────────────────────────────────────────
server {
    listen 443 ssl http2;
    server_name fitsocial.com www.fitsocial.com;

    ssl_certificate     /etc/letsencrypt/live/fitsocial.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/fitsocial.com/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;
    ssl_session_cache   shared:SSL:10m;
    ssl_session_timeout 10m;

    # Security headers
    add_header X-Frame-Options "DENY" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
    add_header Content-Security-Policy "default-src 'self'; img-src 'self' https://cdn.fitsocial.com data:; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com;" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=(self)" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # API
    location /api/ {
        limit_req zone=api_limit burst=50 nodelay;
        proxy_pass         http://api_cluster;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade $http_upgrade;
        proxy_set_header   Connection 'upgrade';
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
    }

    # Auth endpoints — rate limit mais restrito
    location /api/auth/ {
        limit_req zone=auth_limit burst=5 nodelay;
        proxy_pass http://api_cluster;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Next.js
    location / {
        proxy_pass http://nextjs;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    # Assets estáticos Next.js — cache agressivo
    location /_next/static/ {
        proxy_pass  http://nextjs;
        add_header  Cache-Control "public, max-age=31536000, immutable";
    }
}

# HTTP → HTTPS redirect
server {
    listen 80;
    server_name fitsocial.com www.fitsocial.com;
    return 301 https://$host$request_uri;
}
